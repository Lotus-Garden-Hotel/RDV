<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Defect Management</title>
    <style>
        body { font-family: Arial, sans-serif; }
        form { margin-bottom: 20px; }
        input[type='file'] { margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Room Defect Management</h1>
    <div id="login">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
    <div id="upload">
        <h2>Upload Photo</h2>
        <form id="uploadForm">
            <input type="file" id="photo" accept="image/*" required>
            <button type="submit">Upload</button>
            <progress id="uploadProgress" value="0" max="100"></progress>
        </form>
    </div>
    <div id="defectManagement">
        <h2>Manage Defects</h2>
        <ul id="defectList"></ul>
        <form id="defectForm">
            <input type="text" id="defectDescription" placeholder="Defect Description" required>
            <button type="submit">Add Defect</button>
        </form>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const defectForm = document.getElementById('defectForm');
        const defectList = document.getElementById('defectList');
        const uploadProgress = document.getElementById('uploadProgress');

        uploadForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const fileInput = document.getElementById('photo');
            const file = fileInput.files[0];

            if (file) {
                const formData = new FormData();
                formData.append('photo', file);
                uploadFile(formData);
            }
        });

        function uploadFile(formData) {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://YOUR_GAS_ENDPOINT_URL');
            xhr.upload.onprogress = function(event) {
                if (event.lengthComputable) {
                    const percentComplete = (event.loaded / event.total) * 100;
                    uploadProgress.value = percentComplete;
                }
            };

            xhr.onload = function() {
                if (xhr.status === 200) {
                    alert('File uploaded successfully!');
                } else {
                    alert('Upload failed. Retrying...');
                    // Retry mechanism
                    uploadFile(formData);
                }
            };
            xhr.send(formData);
        }

        defectForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const description = document.getElementById('defectDescription').value;
            addDefect(description);
        });

        function addDefect(description) {
            // Send defect description to backend (GAS)
            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://YOUR_GAS_DEFECT_ENDPOINT_URL');
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() {
                if (xhr.status === 200) {
                    const newDefect = document.createElement('li');
                    newDefect.textContent = description;
                    defectList.appendChild(newDefect);
                }
            };
            xhr.send(JSON.stringify({ description }));
        }
    </script>
</body>
</html>
